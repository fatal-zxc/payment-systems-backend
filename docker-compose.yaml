services:
  db:
    container_name: payment-systems-postgres
    image: postgres:17.9-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payment-systems

  redis:
    container_name: payment-systems-redis
    image: redis:7.4-alpine
    restart: always
    ports:
      - 6379:6379
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD}',
        '--bind',
        '0.0.0.0',
        '--maxmemory',
        '512mb',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis_data:/data
    networks:
      - payment-systems

  redis-insight:
    container_name: payment-systems-redis-insight
    image: redis/redisinsight:latest
    restart: always
    ports:
      - 5540:5540
    networks:
      - payment-systems

volumes:
  postgres_data:
  redis_data:

networks:
  payment-systems:
